<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Greens - Digital Bill</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #ffc107; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; font-weight: bold; font-size: 20px; }
        .search-container { padding: 10px; background: white; text-align: center; border-bottom: 1px solid #ddd; position: sticky; top: 54px; z-index: 999; }
        #searchInput { width: 85%; padding: 10px; border: 2px solid #eee; border-radius: 20px; outline: none; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .img-box { width: 100%; height: 120px; background: #eee; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card h3 { margin: 8px 0 2px; font-size: 1em; color: #333; text-transform: capitalize; }
        .card .price { color: #1b5e20; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        .weight-inputs { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 10px; }
        .weight-inputs input { width: 40px; padding: 6px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .add-btn { background: var(--secondary); border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 90%; margin-bottom: 10px; font-size: 13px; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 1000; box-sizing: border-box; }
        #billModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

<header>KRISHNA GREENS</header>
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Sabzi dhoondhein..." onkeyup="filterProducts()">
</div>
<div class="container" id="product-list"></div>

<div class="cart-bar">
    <div style="font-weight: bold;">Bill: ₹<span id="totalDisplay">0</span></div>
    <button style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold;" onclick="openBill()">Order Karein</button>
</div>

<div id="billModal">
    <div class="modal-content">
        <h3 style="text-align:center;">KRISHNA GREENS BILL</h3>
        <div id="billItems"></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>Total:</span> <span>₹<span id="modalGrandTotal">0</span></span>
        </div>
        <form action="https://formspree.io/f/xyknwkyy" method="POST">
            <input type="hidden" name="Order" id="hiddenBillText">
            <input type="text" name="Name" placeholder="Aapka Naam" required style="width:100%; padding:10px; margin-top:15px; border:1px solid #ddd; border-radius:8px;">
            <input type="tel" name="Phone" placeholder="Mobile Number" required style="width:100%; padding:10px; margin-top:10px; border:1px solid #ddd; border-radius:8px;">
            <button type="submit" style="width:100%; background:#1b5e20; color:white; padding:12px; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">CONFIRM</button>
        </form>
        <p onclick="closeBill()" style="text-align:center; color:red; cursor:pointer; margin-top:10px;">Edit Bill</p>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1yv8ViLGwqpPNntMkoORlWRKxDuID6fdr-ySIYejUrfA/gviz/tq?tqx=out:csv';
    let allProducts = [], cart = {};

    Papa.parse(sheetUrl, {
        download: true, header: true,
        complete: function(results) {
            allProducts = results.data.filter(row => row.Name && row.Price);
            displayProducts(allProducts);
        }
    });

    function displayProducts(products) {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        products.forEach((item, index) => {
            const name = item.Name.toLowerCase().trim();
            // *** POWERFUL PHOTO PROXY ***
            // Ye direct image fetch karega
            const imgSrc = `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`; // Fallback icon
            const finalImg = `https://source.unsplash.com/400x300/?vegetable,${name}`;

            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="img-box">
                    <img src="${finalImg}" onerror="this.src='https://via.placeholder.com/400x300?text=${item.Name}'">
                </div>
                <h3>${item.Name}</h3>
                <div class="price">₹${item.Price}/kg</div>
                <div class="weight-inputs">
                    <input type="number" id="kg-${index}" placeholder="0"> <small>KG</small>
                    <input type="number" id="gm-${index}" placeholder="0"> <small>GM</small>
                </div>
                <button class="add-btn" id="btn-${index}" onclick="addToCart('${item.Name}', ${item.Price}, ${index})">Add to Bill</button>
            `;
            list.appendChild(div);
        });
    }

    function addToCart(name, price, index) {
        const kg = parseFloat(document.getElementById(`kg-${index}`).value) || 0;
        const gm = parseFloat(document.getElementById(`gm-${index}`).value) || 0;
        if(kg === 0 && gm === 0) return;
        const totalWeight = kg + (gm / 1000);
        cart[name] = { price: price, kg: kg, gm: gm, totalWeight: totalWeight };
        updateTotal();
        const btn = document.getElementById(`btn-${index}`);
        btn.innerText = "Added ✓"; btn.style.background = "#4CAF50"; btn.style.color = "white";
        setTimeout(() => { btn.innerText = "Add to Bill"; btn.style.background = "#ffc107"; btn.style.color = "black"; }, 1000);
    }

    function updateTotal() {
        let total = 0;
        for(let key in cart) { total += cart[key].price * cart[key].totalWeight; }
        document.getElementById('totalDisplay').innerText = total.toFixed(2);
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.Name.toLowerCase().includes(term));
        displayProducts(filtered);
    }

    function openBill() {
        if(Object.keys(cart).length === 0) return;
        document.getElementById('billModal').style.display = 'flex';
        let html = "", text = "", grand = 0;
        for(let key in cart) {
            let rowTotal = cart[key].price * cart[key].totalWeight;
            grand += rowTotal;
            let weight = `${cart[key].kg > 0 ? cart[key].kg+'kg ' : ''}${cart[key].gm > 0 ? cart[key].gm+'gm' : ''}`;
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${key} (${weight})</span> <span>₹${rowTotal.toFixed(2)}</span></div>`;
            text += `${key} (${weight}): ₹${rowTotal.toFixed(2)} | `;
        }
        document.getElementById('billItems').innerHTML = html;
        document.getElementById('modalGrandTotal').innerText = grand.toFixed(2);
        document.getElementById('hiddenBillText').value = text + " Total: ₹" + grand.toFixed(2);
    }
    function closeBill() { document.getElementById('billModal').style.display = 'none'; }
</script>
</body>
</html>
