<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Greens - Fixed Photos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #ffc107; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; }
        
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Fixed Search Bar */
        .search-container { padding: 12px; background: white; text-align: center; border-bottom: 1px solid #ddd; position: sticky; top: 58px; z-index: 999; }
        #searchInput { width: 90%; max-width: 400px; padding: 12px; border: 2px solid #eee; border-radius: 25px; outline: none; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #fafafa; border-bottom: 1px solid #eee; }
        .card h3 { margin: 10px 0 2px; font-size: 1.1em; color: #333; text-transform: capitalize; }
        .card .price { color: #1b5e20; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        
        /* Improved KG/Gram Inputs */
        .weight-inputs { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 12px; }
        .weight-inputs input { width: 50px; padding: 8px; border: 2px solid #eee; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; background: #f9f9f9; }
        .weight-inputs label { font-size: 12px; font-weight: bold; color: #666; }

        .add-btn { background: var(--secondary); border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 90%; margin-bottom: 10px; font-size: 14px; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); }

        /* Fixed Floating Bill Bar */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .total-info { font-size: 18px; font-weight: bold; color: var(--primary); }
        .checkout-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }

        /* Receipt Style Modal */
        #billModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .bill-header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 10px; margin-bottom: 15px; }
        .bill-header h2 { margin: 0; color: #1b5e20; letter-spacing: 1px; }
        .bill-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        
        .modal-inputs { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .confirm-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: 900;">KRISHNA GREENS</div>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Sabzi dhoondhein (e.g. Aloo)..." onkeyup="filterProducts()">
</div>

<div class="container" id="product-list"></div>

<div class="cart-bar">
    <div class="total-info">Total: ₹<span id="totalDisplay">0</span></div>
    <button class="checkout-btn" onclick="openBill()">Order Karein</button>
</div>

<div id="billModal">
    <div class="modal-content">
        <div class="bill-header">
            <h2>KRISHNA GREENS</h2>
            <p style="margin: 5px 0 0; font-weight: bold; text-transform: uppercase; font-size: 14px;">Cash Memo / Order Receipt</p>
        </div>
        
        <div id="billItems"></div>
        
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin: 20px 0; color: #1b5e20; border-top: 2px solid #333; padding-top: 10px;">
            <span>GRAND TOTAL:</span> <span>₹<span id="modalGrandTotal">0</span></span>
        </div>
        
        <form action="https://formspree.io/f/xyknwkyy" method="POST">
            <input type="hidden" name="Order_Summary_Data" id="hiddenBillText">
            <input type="hidden" name="Total_Amount" id="hiddenTotal">
            <input type="text" name="Client_Name" placeholder="Aapka Naam" required class="modal-inputs">
            <input type="tel" name="Client_Mobile" placeholder="WhatsApp Number" required class="modal-inputs">
            <button type="submit" class="confirm-btn">PLACE ORDER NOW</button>
            <p onclick="closeBill()" style="text-align: center; color: red; cursor: pointer; margin-top: 15px; font-weight: bold;">← Cancel & Edit</p>
        </form>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1yv8ViLGwqpPNntMkoORlWRKxDuID6fdr-ySIYejUrfA/gviz/tq?tqx=out:csv';
    let allProducts = [], cart = {};

    // *** SUPER FIXED PHOTO LIBRARY ***
    // Use clear, reliable images from trusted sources.
    const photos = {
        'aloo': 'https://upload.wikimedia.org/wikipedia/commons/a/ab/Patatas_u_u_u.jpg',
        'tamatar': 'https://upload.wikimedia.org/wikipedia/commons/8/89/Tomato_je.jpg',
        'pyaz': 'https://upload.wikimedia.org/wikipedia/commons/a/a3/Red_onion.jpg',
        'matar': 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Fresh_peas_in_pods_2.jpg',
        'gajar': 'https://upload.wikimedia.org/wikipedia/commons/b/bd/Carrots_%28USDA%29.jpg',
        'hari mirch': 'https://upload.wikimedia.org/wikipedia/commons/8/87/Green_Chili_at_Market.jpg',
        'bhindi': 'https://upload.wikimedia.org/wikipedia/commons/e/ec/Abelmoschus_esculentus_at_market.jpg',
        'baingan': 'https://upload.wikimedia.org/wikipedia/commons/e/e6/Aubergine_fruit.jpg',
        'adrak': 'https://upload.wikimedia.org/wikipedia/commons/c/c9/Gemberwortel.jpg',
        'dhaniya': 'https://upload.wikimedia.org/wikipedia/commons/1/1d/Coriander_leaves.jpg',
        'kaddu': 'https://upload.wikimedia.org/wikipedia/commons/1/18/Pumpkin_je.jpg',
        'gobhi': 'https://upload.wikimedia.org/wikipedia/commons/4/41/Cauliflower_je.jpg',
        'default': 'https://upload.wikimedia.org/wikipedia/commons/1/1a/Vegetable_market_2.jpg'
    };

    Papa.parse(sheetUrl, {
        download: true, header: true,
        complete: function(results) {
            allProducts = results.data.filter(row => row.Name && row.Price);
            displayProducts(allProducts);
        }
    });

    function displayProducts(products) {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        products.forEach((item, index) => {
            const cleanName = item.Name.toLowerCase().trim();
            const imgSrc = photos[cleanName] || photos['default'];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${imgSrc}" alt="${item.Name}" onerror="this.src='${photos['default']}';">
                <h3>${item.Name}</h3>
                <div class="price">₹${item.Price}/kg</div>
                <div class="weight-inputs">
                    <input type="number" id="kg-${index}" placeholder="0" min="0"> <label>KG</label>
                    <input type="number" id="gm-${index}" placeholder="0" min="0" step="50"> <label>GM</label>
                </div>
                <button class="add-btn" onclick="addToCart('${item.Name}', ${item.Price}, ${index})">Add to Bill</button>
            `;
            list.appendChild(div);
        });
    }

    function addToCart(name, price, index) {
        const kg = parseFloat(document.getElementById(`kg-${index}`).value) || 0;
        const gm = parseFloat(document.getElementById(`gm-${index}`).value) || 0;
        if(kg === 0 && gm === 0) { alert("Pehle KG ya Gram wazan bhariye!"); return; }

        const totalWeight = kg + (gm / 1000);
        cart[name] = { price: price, kg: kg, gm: gm, totalWeight: totalWeight };
        updateUI();
        
        // Button Feedback
        const btn = document.querySelectorAll('.add-btn')[index];
        btn.innerText = "Added ✓"; btn.style.background = "#4CAF50"; btn.style.color = "white";
        setTimeout(() => { btn.innerText = "Add to Bill"; btn.style.background = "#ffc107"; btn.style.color = "black"; }, 1000);
    }

    function updateUI() {
        let total = 0;
        for(let key in cart) { total += cart[key].price * cart[key].totalWeight; }
        document.getElementById('totalDisplay').innerText = total.toFixed(2);
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.Name.toLowerCase().includes(term));
        displayProducts(filtered);
    }

    function openBill() {
        if(Object.keys(cart).length === 0) { alert("Cart khali hai! Kuch items add karein."); return; }
        document.getElementById('billModal').style.display = 'flex';
        let html = "", text = "", grand = 0;
        for(let key in cart) {
            let rowTotal = cart[key].price * cart[key].totalWeight;
            grand += rowTotal;
            let weightInfo = `${cart[key].kg > 0 ? cart[key].kg+'kg ' : ''}${cart[key].gm > 0 ? cart[key].gm+'gm' : ''}`;
            html += `<div class="bill-item"><span>${key} (${weightInfo})</span> <span>₹${rowTotal.toFixed(2)}</span></div>`;
            text += `${key}: ${weightInfo} = ₹${rowTotal.toFixed(2)} | `;
        }
        document.getElementById('billItems').innerHTML = html;
        document.getElementById('modalGrandTotal').innerText = grand.toFixed(2);
        document.getElementById('hiddenBillText').value = text + " Total: ₹" + grand.toFixed(2);
        document.getElementById('hiddenTotal').value = grand.toFixed(2);
    }

    function closeBill() { document.getElementById('billModal').style.display = 'none'; }
</script>
</body>
</html>
