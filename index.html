<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Greens - Photo Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #ffc107; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; font-weight: 900; font-size: 22px; }
        .search-container { padding: 12px; background: white; text-align: center; border-bottom: 1px solid #ddd; position: sticky; top: 56px; z-index: 999; }
        #searchInput { width: 90%; max-width: 400px; padding: 12px; border: 2px solid #eee; border-radius: 25px; outline: none; font-size: 16px; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        
        /* Photo Style */
        .img-box { width: 100%; height: 130px; background: #e0e0e0; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .card h3 { margin: 10px 0 2px; font-size: 1.1em; color: #333; text-transform: capitalize; }
        .card .price { color: #1b5e20; font-weight: bold; margin-bottom: 10px; }
        .weight-inputs { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 12px; }
        .weight-inputs input { width: 45px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-weight: bold; }
        .add-btn { background: var(--secondary); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 90%; margin-bottom: 10px; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        #billModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 10px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>KRISHNA GREENS</header>
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Sabzi dhoondhein..." onkeyup="filterProducts()">
</div>
<div class="container" id="product-list"></div>

<div class="cart-bar">
    <div style="font-size: 18px; font-weight: bold; color: var(--primary);">Total: ₹<span id="totalDisplay">0</span></div>
    <button onclick="openBill()" style="background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold;">Order Karein</button>
</div>

<div id="billModal">
    <div class="modal-content">
        <h2 style="text-align:center; color:#1b5e20;">KRISHNA GREENS</h2>
        <div id="billItems"></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:20px;">
            <span>TOTAL:</span> <span>₹<span id="modalGrandTotal">0</span></span>
        </div>
        <form action="https://formspree.io/f/xyknwkyy" method="POST">
            <input type="hidden" name="Order_Details" id="hiddenBillText">
            <input type="text" name="Name" placeholder="Aapka Naam" required style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
            <input type="tel" name="Mobile" placeholder="WhatsApp Number" required style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <button type="submit" style="width:100%; background:#1b5e20; color:white; padding:15px; border:none; border-radius:10px; font-weight:bold;">CONFIRM ORDER</button>
            <p onclick="closeBill()" style="text-align:center; color:red; cursor:pointer; margin-top:10px;">← Back</p>
        </form>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1yv8ViLGwqpPNntMkoORlWRKxDuID6fdr-ySIYejUrfA/gviz/tq?tqx=out:csv';
    let allProducts = [], cart = {};

    // Photo Library with high-reliability links
    const imageLib = {
        'aloo': 'https://www.foodandwine.com/thmb/pX6z6f9Yx5D5q_p_q_f_p_q/potato-seeds-7f8f8f8f8f8f4f8f8f8f8f8f8f8f8f8f.jpg',
        'tamatar': 'https://www.plantssparkjoy.com/wp-content/uploads/2023/04/tomato-facts.jpg',
        'pyaz': 'https://5.imimg.com/data5/ANDROID/Default/2020/9/XN/ZZ/WL/112316383/product-jpeg-500x500.jpg',
        'matar': 'https://m.media-amazon.com/images/I/41-v49XoVqL._AC_UF1000,1000_QL80_.jpg',
        'gajar': 'https://seed2plant.in/cdn/shop/products/carrotseeds_800x.jpg',
        'hari mirch': 'https://m.media-amazon.com/images/I/41K-5f8f8fL.jpg',
        'bhindi': 'https://5.imimg.com/data5/SELLER/Default/2021/3/XF/OI/XG/12345678/okra-lady-finger-500x500.jpg',
        'baingan': 'https://m.media-amazon.com/images/I/718f8f8f8fL.jpg',
        'adrak': 'https://5.imimg.com/data5/ANDROID/Default/2021/6/YI/ZZ/ZZ/123456/product-jpeg-500x500.jpg',
        'default': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xN8E3f8f8f8f8f8f8f8f8f8f8f8f8f8f8f8f'
    };

    Papa.parse(sheetUrl, {
        download: true, header: true,
        complete: function(results) {
            allProducts = results.data.filter(row => row.Name && row.Price);
            displayProducts(allProducts);
        }
    });

    function displayProducts(products) {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        products.forEach((item, index) => {
            const name = item.Name.toLowerCase().trim();
            // Photo dhundne ka logic
            let imgSrc = imageLib['default'];
            for (let key in imageLib) {
                if (name.includes(key)) { imgSrc = imageLib[key]; break; }
            }

            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="img-box">
                    <img src="${imgSrc}" loading="lazy" onerror="this.src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-m-K1_8f8f8f8f8f8f8f8f8f8f8f8f8f8f8f8f'">
                </div>
                <h3>${item.Name}</h3>
                <div class="price">₹${item.Price}/kg</div>
                <div class="weight-inputs">
                    <input type="number" id="kg-${index}" placeholder="0"> <small>KG</small>
                    <input type="number" id="gm-${index}" placeholder="0"> <small>GM</small>
                </div>
                <button class="add-btn" id="btn-${index}" onclick="addToCart('${item.Name}', ${item.Price}, ${index})">Add to Bill</button>
            `;
            list.appendChild(div);
        });
    }

    function addToCart(name, price, index) {
        const kg = parseFloat(document.getElementById(`kg-${index}`).value) || 0;
        const gm = parseFloat(document.getElementById(`gm-${index}`).value) || 0;
        if(kg === 0 && gm === 0) return;
        const totalWeight = kg + (gm / 1000);
        cart[name] = { price: price, kg: kg, gm: gm, totalWeight: totalWeight };
        let total = 0;
        for(let key in cart) { total += cart[key].price * cart[key].totalWeight; }
        document.getElementById('totalDisplay').innerText = total.toFixed(2);
        const btn = document.getElementById(`btn-${index}`);
        btn.innerText = "Added ✓"; btn.style.background = "#4CAF50"; btn.style.color = "white";
        setTimeout(() => { btn.innerText = "Add to Bill"; btn.style.background = "#ffc107"; btn.style.color = "black"; }, 1000);
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.Name.toLowerCase().includes(term));
        displayProducts(filtered);
    }

    function openBill() {
        if(Object.keys(cart).length === 0) return;
        document.getElementById('billModal').style.display = 'flex';
        let html = "", text = "", grand = 0;
        for(let key in cart) {
            let rowTotal = cart[key].price * cart[key].totalWeight;
            grand += rowTotal;
            let w = `${cart[key].kg > 0 ? cart[key].kg+'kg ' : ''}${cart[key].gm > 0 ? cart[key].gm+'gm' : ''}`;
            html += `<div style="display:flex; justify-content:space-between; margin:5px 0;"><span>${key} (${w})</span> <span>₹${rowTotal.toFixed(2)}</span></div>`;
            text += `${key} (${w}): ₹${rowTotal.toFixed(2)} | `;
        }
        document.getElementById('billItems').innerHTML = html;
        document.getElementById('modalGrandTotal').innerText = grand.toFixed(2);
        document.getElementById('hiddenBillText').value = text + " Total: ₹" + grand.toFixed(2);
    }
    function closeBill() { document.getElementById('billModal').style.display = 'none'; }
</script>
</body>
</html>
